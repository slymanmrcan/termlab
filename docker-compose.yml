services:
  fake-terminal:
    container_name: fake-terminal
    image: fake-terminal:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_PATH: /
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - infra_net
    mem_limit: 64m
    cpus: 0.25
    pids_limit: 64
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/log/nginx
      - /var/run
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  infra_net:
    external: true
